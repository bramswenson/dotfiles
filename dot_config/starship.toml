# Starship prompt — Boxed Header with right-aligned time
# Style 8B: ╭─ dir on branch [status] via tools
#            ╰─🛸 ❯

format = """
[╭─](fg:#394260) \
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$ruby\
$kubernetes\
$docker_context\
$package\
$line_break\
[╰─](fg:#394260)$character"""

right_format = """$cmd_duration$time"""

[character]
success_symbol = '[🛸 ❯](fg:#a3aed2)'
error_symbol = '[🛸 ❯](bold red)'

[directory]
style = "bold fg:#769ff0"
truncation_length = 5
truncation_symbol = "…/"
truncate_to_repo = false

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "fg:#7dcfff"
format = '[ on $symbol $branch]($style)'

[git_status]
style = "fg:#e0af68"
format = '[ \[$all_status$ahead_behind\]]($style)'

[python]
symbol = ""
style = "fg:#9ece6a"
format = '[ via $symbol $version]($style)'

[nodejs]
symbol = "⬢"
style = "fg:#9ece6a"
format = '[ via $symbol $version]($style)'

[rust]
symbol = ""
style = "fg:#9ece6a"
format = '[ via $symbol $version]($style)'

[golang]
symbol = ""
style = "fg:#9ece6a"
format = '[ via $symbol $version]($style)'

[ruby]
symbol = ""
style = "fg:#9ece6a"
format = '[ via $symbol $version]($style)'
detect_variables = []

[kubernetes]
disabled = false
style = "fg:#769ff0"
format = '[ on  $context]($style)'

[docker_context]
symbol = ""
style = "fg:#769ff0"
format = '[ via $symbol $context]($style)'

[package]
style = "fg:#a0a9cb"
format = '[ is $symbol$version]($style)'

[cmd_duration]
min_time = 2_000
style = "fg:#e0af68"
format = '[$duration]($style) '

[time]
disabled = false
time_format = "%R"
style = "fg:#a0a9cb"
format = '[ $time]($style)'

[hostname]
format = '[$ssh_symbol$hostname]($style) '
style = "fg:#e3e5e5"
ssh_only = true

[username]
format = '[$user@]($style)'
style_user = "fg:#e3e5e5"
show_always = false
