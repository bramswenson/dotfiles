# Where to put the finished files
OUTPUTDIR="$HOME/Music"

# Use CDDB to fetch album info
CDDBMETHOD=musicbrainz

# Format for the output files and directories
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}/${TRACKNUM} - ${TRACKFILE}'
VAOUTPUTFORMAT='Various_Artists/${ALBUMFILE}/${TRACKNUM} - ${ARTISTFILE} - ${TRACKFILE}'

# Create the output directories automatically
MKCUE=yes
PADTRACKS=yes

# Rip to FLAC
OUTPUTTYPE="flac"

# Use nice options for FLAC encoding
FLACOPTS='-8'  # Maximum compression (slow but small)

# Read the CD carefully
CDPARANOIAOPTS="-Z"

# Always eject the disc when finished
EJECTCD=yes

# Keep WAVs? (no, delete after encoding)
KEEPWAVS=no

# Encode on the fly (saves disk space)
ONTHEFLY=yes

# Nice progress display
DOSUMMARY=yes

# Use these programs
CDROMREADERSYNTAX=cdparanoia
RIPPER=cdparanoia
ENCODERSYNTAX=default

# Lowercase filenames
LAMEOPTS='--tt "$TRACKNAME" --ta "$ARTIST" --tl "$ALBUM" --tn "$TRACKNUM" --tg "$GENRE" --ty "$YEAR" --add-id3v2'

# Set nice file permissions
umask 022
